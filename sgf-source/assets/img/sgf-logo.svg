<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLACEHOLDER LOGO — replace this file (or assets/img/sgf-logo.png) with the
  client's official SGFSOURCING wordmark when available. All <img> references
  on every page point to either this SVG or a sibling `sgf-logo.png` of the
  same dimensions.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="SGF Sourcing logo">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#796254"/>
      <stop offset="100%" stop-color="#523F31"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="#FAF7F2"/>
  <!-- Globe / arrow ring -->
  <circle cx="100" cy="92" r="40" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <!-- Latitude -->
  <ellipse cx="100" cy="92" rx="40" ry="14" fill="none" stroke="url(#ring)" stroke-width="2"/>
  <!-- Arrow -->
  <path d="M58 92 Q 100 50 142 92" fill="none" stroke="url(#ring)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="142,92 134,86 134,98" fill="#523F31"/>
  <!-- Coconut + leaf -->
  <circle cx="100" cy="98" r="9" fill="#4A8C4F"/>
  <path d="M100 88 q 8 -10 16 -6 q -4 8 -16 6 z" fill="#7BB369"/>
  <!-- Wordmark -->
  <text x="100" y="155" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="22" font-weight="700" letter-spacing="2" fill="#2D1E17">SGFSOURCING</text>
  <!-- Tagline -->
  <text x="100" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="3" fill="#796254">VIETNAM AGRI · CONNECTING MARKETS</text>
  <!-- Decorative rules -->
  <line x1="20" y1="165" x2="40" y2="165" stroke="#796254" stroke-width="1"/>
  <line x1="160" y1="165" x2="180" y2="165" stroke="#796254" stroke-width="1"/>
</svg>
